<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SIGNAL — Terminal</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%2305080d'/%3E%3Crect x='6' y='13' width='4' height='13' rx='1' fill='%23ffb000'/%3E%3Crect x='14' y='7' width='4' height='19' rx='1' fill='%2326e07b'/%3E%3Crect x='22' y='11' width='4' height='15' rx='1' fill='%233cc9d6'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#05080d; --bg2:#080c12; --panel:#0a1018; --panel2:#0e151f;
    --line:#161f2b; --line2:#1f2b3a;
    --text:#d4dde8; --muted:#7a8a9e; --dim:#4f5e72;
    --green:#26e07b; --red:#ff4d6a; --amber:#ffb000; --cyan:#3cc9d6; --violet:#b08cff; --blue:#5aa6ff;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
    --display:"Space Grotesk","JetBrains Mono",var(--mono);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--mono);font-size:14px;color:var(--text);-webkit-font-smoothing:antialiased;
       background:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px) 0 0/100% 30px, var(--bg);}
  .wrap{max-width:1240px;margin:0 auto;padding:16px 16px 70px}
  .num{font-variant-numeric:tabular-nums}
  .livetag{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1px;color:#0a0a0a;background:var(--cyan);border-radius:2px;padding:1px 4px;margin-left:5px;vertical-align:1px}
  .vprow{display:flex;align-items:center;gap:8px;height:9px;margin:1.5px 0}
  .vpp{font-size:9px;color:var(--dim);min-width:56px;text-align:right;font-variant-numeric:tabular-nums}
  .vpbar{height:7px;border-radius:1px;min-width:2px}
  .rr{font-size:11.5px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:3px;padding:8px 11px;margin-top:10px;line-height:1.6}
  .rr .rrk{color:var(--cyan);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-right:7px}
  /* command bar */
  .cmdbar{display:flex;align-items:center;gap:14px;border:1px solid var(--line2);border-top:2px solid var(--amber);
          background:var(--panel);padding:10px 14px;border-radius:3px}
  .brand{display:flex;align-items:center;font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:6px;color:var(--text)}
  .mark{margin-right:9px;flex:none}
  .brand b{color:var(--amber)}
  .spacer{flex:1}
  .badge{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;border:1px solid var(--dim);color:var(--dim)}
  .badge.live{color:#02140a;background:var(--green);border-color:var(--green)}
  .badge.sample{color:#1a1203;background:var(--amber);border-color:var(--amber)}
  .hmeta{text-align:right;color:var(--dim);font-size:11px;line-height:1.4}
  .clk{color:var(--cyan);font-size:12px;letter-spacing:1px;border-left:1px solid var(--line2);padding-left:12px}
  /* pulse tape */
  .pulse{display:flex;gap:9px;align-items:flex-start;margin:12px 0 4px;background:var(--panel);
         border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:3px;padding:11px 13px;
         font-size:13px;line-height:1.5;color:var(--muted)}
  .pulse::before{content:"›";color:var(--cyan);font-weight:800}
  .pulse b{color:var(--text);font-weight:700}
  /* breadth */
  .breadth{margin:6px 0 2px}
  .bbar{display:flex;height:8px;border-radius:2px;overflow:hidden;border:1px solid var(--line);background:var(--panel)}
  .bbar span{display:block}
  .blegend{font-size:10px;color:var(--dim);margin-top:5px;letter-spacing:1.2px;text-transform:uppercase}
  .alerts{margin:6px 0 2px}
  .alabel{color:var(--amber);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;margin:8px 0 7px}
  .achip{display:inline-block;font-size:11px;background:var(--panel);border:1px solid var(--line2);border-radius:2px;padding:5px 9px;margin:0 6px 6px 0;cursor:pointer}
  .achip:hover{border-color:var(--amber)}
  .achip b{color:var(--amber);letter-spacing:.5px}
  /* hero / editorial lead */
  .hero{display:grid;grid-template-columns:1.7fr 1fr;gap:12px;margin:13px 0 2px}
  @media(max-width:760px){.hero{grid-template-columns:1fr}}
  .lead{background:var(--panel);border:1px solid var(--line2);border-top:2px solid var(--amber);border-radius:3px;padding:14px 16px}
  .gauges{background:var(--panel);border:1px solid var(--line2);border-radius:3px;padding:14px 16px}
  .leadhd{font-family:var(--display);color:var(--amber);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:11px}
  .regime{display:flex;align-items:baseline;gap:13px;margin-bottom:6px}
  .rword{font-family:var(--display);font-size:34px;font-weight:700;letter-spacing:1px;color:var(--text);line-height:.9}
  .rsub{color:var(--dim);font-size:11px;letter-spacing:2px}
  .lead .breadth{margin:8px 0 0}
  .lead .pulse{background:transparent;border:none;border-left:2px solid var(--cyan);border-radius:0;padding:6px 0 6px 11px;margin:12px 0 0}
  .lead .pulse:empty{display:none}
  .lead .pulse::before{content:""}
  .lead .alerts{margin:12px 0 0}
  .grow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .grow:last-child{border-bottom:none}
  .gk{color:var(--cyan);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;min-width:40px}
  .gv{flex:1;text-align:right;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
  .gd{min-width:54px;text-align:right;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
  /* search */
  .searchbar{display:flex;align-items:center;margin:13px 0 2px;background:var(--panel);
             border:1px solid var(--line2);border-radius:3px;overflow:hidden}
  .searchbar::before{content:">";color:var(--amber);font-weight:800;padding:0 6px 0 14px}
  .searchbar input{flex:1;background:transparent;border:none;padding:12px;color:var(--text);
                   font-family:var(--mono);font-size:14px;letter-spacing:.5px;outline:none;caret-color:var(--amber)}
  .searchbar input::placeholder{color:var(--dim)}
  .searchbar button{background:transparent;color:var(--amber);border:none;border-left:1px solid var(--line2);
                    padding:0 18px;align-self:stretch;font-family:var(--mono);font-weight:800;cursor:pointer;
                    font-size:12px;letter-spacing:1.5px}
  .searchbar button:hover{background:var(--amber);color:#0a0a0a}
  .searchwrap{position:relative}
  .acmenu{position:absolute;left:0;right:0;top:100%;z-index:50;background:var(--panel);border:1px solid var(--line2);border-top:none;border-radius:0 0 3px 3px;max-height:300px;overflow:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  .acmenu.open{display:block}
  .acitem{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);font-size:13px}
  .acitem:last-child{border-bottom:none}
  .acitem.sel,.acitem:hover{background:rgba(255,176,0,.08)}
  .acsym{color:var(--amber);font-weight:800;min-width:62px}
  .acname{color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acwl{font-size:8.5px;letter-spacing:1px;color:var(--cyan);border:1px solid var(--line2);border-radius:2px;padding:1px 5px}
  /* section header */
  .sec{display:flex;align-items:center;gap:10px;margin:22px 0 10px;color:var(--amber);font-family:var(--display);
       font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px}
  .sec::before{content:"";width:3px;height:13px;background:var(--amber)}
  .sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
  .sec .sub{color:var(--dim);font-weight:600;letter-spacing:1px;text-transform:none}
  /* macro strip */
  .chips{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:3px;background:var(--panel);overflow:hidden}
  .chip{padding:9px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:2px;min-width:92px}
  .chip .k{color:var(--cyan);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px}
  .chip .v{font-size:16px;font-weight:700;color:var(--text)}
  .chip .d{font-size:11px;font-weight:600}
  .chip .n{font-size:10px;color:var(--dim)}
  /* index cards */
  .idx{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:760px){.idx{grid-template-columns:1fr}}
  .icard{background:var(--panel);border:1px solid var(--line2);border-radius:3px;padding:13px;cursor:pointer;transition:.12s}
  .icard:hover{border-color:var(--amber)}
  .icard .top{display:flex;align-items:baseline;gap:8px}
  .icard .sym{font-size:17px;font-weight:800;color:var(--amber);letter-spacing:1px}
  .icard .nm{color:var(--dim);font-size:11px}
  .icard .px{margin-left:auto;font-size:17px;font-weight:700}
  .icard .pc{font-size:13px;font-weight:700;margin-left:6px}
  .ichart{height:140px;margin:10px 0 8px;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#060a10}
  .read{color:#aab6c4;font-size:12px;line-height:1.5}
  /* tags */
  .tag{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid var(--line2)}
  .tag.uptrend{color:var(--green);border-color:#1c5e3c;background:rgba(38,224,123,.08)}
  .tag.downtrend{color:var(--red);border-color:#6e2233;background:rgba(255,77,106,.08)}
  .tag.range{color:var(--muted);border-color:var(--line2)}
  /* triggers */
  .trigs{display:flex;gap:8px;margin-top:10px}
  .trig{flex:1;border-radius:2px;padding:7px 9px;font-size:11px;line-height:1.4}
  .trig.b{background:rgba(38,224,123,.06);border:1px solid #1c5e3c;color:#8fe6b4}
  .trig.s{background:rgba(255,77,106,.06);border:1px solid #6e2233;color:#ffaeba}
  .trig .l{display:block;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:2px}
  /* watchlist table */
  .dtbl{width:100%;min-width:720px;border-collapse:collapse;border:1px solid var(--line2);border-radius:3px;overflow:hidden}
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .dtbl th{text-align:left;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);
           font-weight:700;padding:8px 12px;border-bottom:1px solid var(--line2);background:var(--panel2)}
  .dtbl th.r{text-align:right}
  .dtbl td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .dtbl td.r{text-align:right}
  .dtbl tbody tr:last-child td{border-bottom:none}
  .dtbl .dr{cursor:pointer}
  .dtbl .dr:hover td{background:rgba(255,176,0,.05)}
  .dtbl td.sy{color:var(--amber);font-weight:800;letter-spacing:.5px}
  .dtbl td.nm{color:var(--muted);max-width:210px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dtbl td.chg{font-weight:700}
  .dtbl td.dim2{color:var(--dim)}
  .dtbl .na td{color:var(--dim)}
  .dtbl td.spk{padding:4px 10px;width:96px}
  .dtbl td.spk svg{display:block}
  .dtbl th[data-k]{cursor:pointer}
  .dtbl th[data-k]:hover{color:var(--amber)}
  /* screener */
  .scrow{margin-bottom:12px}
  .subh{color:var(--cyan);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;margin:4px 2px 8px}
  .setup{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line2);
         border-radius:2px;padding:6px 10px;margin:0 7px 7px 0;font-size:12px}
  .dim{color:var(--dim)}
  /* fed */
  .fed{display:flex;gap:8px;flex-wrap:wrap}
  .fcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--dim);border-radius:2px;
         padding:8px 12px;font-size:12px;min-width:150px}
  .fcard.high{border-left-color:var(--amber)}
  .fcard .e{font-weight:600;color:var(--text)}
  .fcard .m{color:var(--muted);font-size:11px;margin-top:2px}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(2,4,8,.85);backdrop-filter:blur(2px);display:none;
         align-items:center;justify-content:center;padding:16px;z-index:60}
  .modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--amber);border-top:2px solid var(--amber);border-radius:3px;
         width:min(840px,100%);max-height:92vh;overflow:auto;padding:18px}
  .sheet h2{margin:0;font-size:19px;color:var(--amber);letter-spacing:1px}
  .x{float:right;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  .x:hover{color:var(--red)}
  #mchart{height:340px;margin:14px 0;border:1px solid var(--line2);border-radius:2px;overflow:hidden;background:#060a10}
  .lv{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .lv .h{color:var(--cyan);font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
  .lv .row{display:flex;gap:8px;font-size:12px;padding:2px 0}
  .lv .row b{min-width:62px;color:var(--text)}
  .lv .row .ev{color:var(--dim)}
  .sc{font-size:9px;color:var(--amber);border:1px solid #5a4410;border-radius:2px;padding:0 4px}
  footer{margin-top:12px;color:var(--dim);font-size:11px;line-height:1.6}
  .statusbar{margin-top:26px;border-top:1px solid var(--line2);padding-top:11px;color:var(--dim);font-size:10.5px;letter-spacing:.5px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .statusbar .kbd{color:var(--muted);border:1px solid var(--line2);border-radius:2px;padding:1px 5px;font-size:9.5px}
  .statusbar .stright{margin-left:auto}
  .curs{display:inline-block;width:7px;height:12px;background:var(--green);animation:blink 1.1s steps(1) infinite;vertical-align:-1px}
  @keyframes blink{50%{opacity:0}}
</style>
</head>

<script>
const EMBEDDED_STATE = __STATE_JSON__;
let S = EMBEDDED_STATE;
const $=id=>document.getElementById(id);
const f=x=>(x===null||x===undefined)?"—":Number(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const sg=x=>(x>0?"+":"")+x;
const col=x=>x>0?"var(--green)":(x<0?"var(--red)":"var(--muted)");
function liveOn(i){return !!(i&&i.live&&i.live.price!=null);}
function lpx(i){return liveOn(i)?i.live.price:(i&&i.ohlc?i.ohlc.close:null);}
function lchg(i){return liveOn(i)?i.live.change_pct:(i?i.change_pct:0);}
function lph(i){const p=liveOn(i)?(i.live.phase||""):"";return p==="pre-market"?"PRE-MKT":p==="after-hours"?"AFT-HRS":p==="live"?"LIVE":"";}
function ltag(i){const t=lph(i);return t?`<span class="livetag">${t}</span>`:"";}
function rr(i){
  const px=lpx(i); if(!px) return null;
  const res=(i.levels_above||[]).find(z=>z.price>px)||(i.levels_above||[])[0];
  const sup=(i.levels_below||[]).find(z=>z.price<px)||(i.levels_below||[])[0];
  if(!res||!sup) return null;
  const reward=res.price-px, risk=px-sup.price;
  if(risk<=0||reward<=0) return null;
  return {risk:risk, reward:reward, rr:reward/risk, sup:sup.price, res:res.price};
}
function fmtCap(v){if(!v)return "";const a=Math.abs(v);if(a>=1e12)return "$"+(v/1e12).toFixed(2)+"T";if(a>=1e9)return "$"+(v/1e9).toFixed(1)+"B";if(a>=1e6)return "$"+(v/1e6).toFixed(0)+"M";return "$"+v;}

function heatColor(p){
  if(p===null||p===undefined) return {bg:"transparent"};
  const c=Math.max(-3,Math.min(3,p))/3;
  if(c>=0) return {bg:`rgba(38,224,123,${0.07+c*0.22})`};
  return {bg:`rgba(255,77,106,${0.07+(-c)*0.22})`};
}

function renderRegime(){
  const el=$("hregime"); if(!el) return;
  const vix=(S.backdrop||[]).find(b=>b.name==="VIX");
  const reg=vix?(vix.value<15?"CALM":vix.value>20?"ELEVATED":"NORMAL"):"—";
  const ph=((S.instruments||[]).map(x=>x.live&&x.live.phase).find(Boolean))||"";
  const phl=ph==="pre-market"?" · PRE-MARKET":ph==="after-hours"?" · AFTER-HOURS":ph==="live"?" · LIVE":"";
  el.innerHTML=`<span class="rword">${reg}</span><span class="rsub">TAPE${vix?` · VIX ${vix.value}`:""}${phl}</span>`;
}
function renderGauges(){
  const el=$("gauges"); if(!el) return;
  const ins=S.instruments||[]; const rows=[];
  ["SPY","QQQ"].forEach(s=>{const i=ins.find(x=>x.symbol===s&&x.verified);if(i)rows.push([s,f(lpx(i)),sg(lchg(i))+"%",col(lchg(i))]);});
  (S.backdrop||[]).forEach(b=>rows.push([b.name,b.value,sg(b.change),col(b.change)]));
  el.innerHTML=rows.map(r=>`<div class="grow"><span class="gk">${r[0]}</span><span class="gv num">${r[1]}</span><span class="gd num" style="color:${r[3]}">${r[2]}</span></div>`).join("");
}
function pulse(){

  $("qbtn").onclick=()=>{acClose();doSearch();};
  $("q").addEventListener("input",acFilter);
  $("q").addEventListener("blur",()=>setTimeout(acClose,160));
  $("q").addEventListener("keydown",e=>{
    const open=$("acmenu")&&$("acmenu").classList.contains("open");
    if(e.key==="ArrowDown"&&open){e.preventDefault();acSel=Math.min(acSel+1,acItems.length-1);acHighlight();}
    else if(e.key==="ArrowUp"&&open){e.preventDefault();acSel=Math.max(acSel-1,-1);acHighlight();}
    else if(e.key==="Enter"){e.preventDefault();if(open&&acSel>=0)acPick(acSel);else{acClose();doSearch();}}
    else if(e.key==="Escape"){acClose();}
  });
}
document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement!==$("q")){e.preventDefault();$("q").focus();}});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeM();});
render();
</script>
</body>
